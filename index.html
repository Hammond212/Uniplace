<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Uni Marketplace</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f4f4;
    }

    header {
        background: #2b2d42;
        color: white;
        padding: 15px;
        text-align: center;
    }

    nav {
        display: flex;
        justify-content: center;
        gap: 20px;
        background: #8d99ae;
        padding: 10px;
    }

    nav button {
        padding: 10px 15px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        background: white;
        font-weight: bold;
    }

    .page {
        display: none;
        padding: 20px;
    }

    .active {
        display: block;
    }

    .listing {
        background: white;
        padding: 10px;
        margin: 10px 0;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .listing img {
        max-width: 200px;
        display: block;
        margin-top: 10px;
    }

    input, textarea {
        width: 100%;
        margin: 10px 0;
        padding: 10px;
    }

    button.post {
        background: green;
        color: white;
        padding: 10px;
        border: none;
        cursor: pointer;
    }
</style>
</head>
<body>

<header>
    <h1>Uni Marketplace</h1>
</header>

<nav>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('marketplace')">Marketplace</button>
</nav>

<!-- HOME PAGE -->
<div id="home" class="page active">
    <h2>Welcome to Uni Marketplace</h2>
    <p>Buy and sell student services and businesses.</p>
</div>

<!-- MARKETPLACE PAGE -->
<div id="marketplace" class="page">

    <h2>Marketplace</h2>

    <button onclick="document.getElementById('form').style.display='block'">
        + Add Business
    </button>

    <div id="form" style="display:none;">
        <h3>Create Listing</h3>

        <input type="text" id="title" placeholder="Business name">
        <textarea id="desc" placeholder="Description"></textarea>
        <input type="file" id="image">

        <button class="post" onclick="addListing()">Post</button>
    </div>

    <div id="listings"></div>
</div>

<script>
function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
}

// Load saved listings
let listings = JSON.parse(localStorage.getItem("listings")) || [];
renderListings();

function addListing() {
    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;
    let imageFile = document.getElementById("image").files[0];

    if (!title || !desc) {
        alert("Please fill all fields");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e) {
        let newListing = {
            title: title,
            desc: desc,
            image: e.target.result
        };

        listings.push(newListing);
        localStorage.setItem("listings", JSON.stringify(listings));

        renderListings();
    };

    if (imageFile) {
        reader.readAsDataURL(imageFile);
    } else {
        let newListing = {
            title: title,
            desc: desc,
            image: ""
        };

        listings.push(newListing);
        localStorage.setItem("listings", JSON.stringify(listings));
        renderListings();
    }

    document.getElementById("form").style.display = "none";
}

function renderListings() {
    let container = document.getElementById("listings");
    container.innerHTML = "";

    listings.forEach(item => {
        container.innerHTML += `
            <div class="listing">
                <h3>${item.title}</h3>
                <p>${item.desc}</p>
                ${item.image ? `<img src="${item.image}">` : ""}
            </div>
        `;
    });
}
</script>

</body>
</html>
